<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kitnets — seu Antônio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0d0d1a;color:#f0f0f0;font-family:sans-serif}input,select{outline:none}button{font-family:sans-serif}</style>
</head>
<body>
<div id="root"><div style="color:#f59e0b;padding:40px;text-align:center">🏢 Carregando...</div></div>
<script>
const e=React.createElement;
const {useState}=React;
const MESES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const MESES_FULL=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const HOJE=new Date();
const UNITS=[{id:1,tipo:"kitnet",nome:"Kitnet 01",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},{id:2,tipo:"kitnet",nome:"Kitnet 02",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},{id:3,tipo:"kitnet",nome:"Kitnet 03",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},{id:4,tipo:"kitnet",nome:"Kitnet 04",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},{id:5,tipo:"kitnet",nome:"Kitnet 05",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},{id:6,tipo:"kitnet",nome:"Kitnet 06",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},{id:7,tipo:"comercial",nome:"Espaço Comercial",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:10,status:"vago"}];
const fmt=v=>Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const sColor=s=>s==="pago"?"#22c55e":s==="atrasado"?"#ef4444":"#f59e0b";
const sLabel=s=>s==="pago"?"Pago":s==="atrasado"?"Atrasado":"Pendente";
const calcAluguel=(unit,ano,mes,lancs)=>{if(unit.status==="vago")return null;const px=`${ano}-${String(mes+1).padStart(2,"0")}`;const ms=lancs.filter(l=>l.tipo==="receita"&&l.unidade===unit.id&&l.data.startsWith(px));const pago=ms.reduce((a,b)=>a+b.valor,0);const venc=new Date(ano,mes,unit.diaCobranca||5);let status=pago>=unit.aluguel?"pago":HOJE>venc?"atrasado":"pendente";return{status,pago,pendente:Math.max(0,unit.aluguel-pago),pagamentos:ms.map(l=>({data:l.data,valor:l.valor}))};};
const card=(children,style={})=>e("div",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:20,...style}},children);
const bi={width:"100%",padding:"9px 11px",borderRadius:9,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:13,boxSizing:"border-box"};

function App(){
  const [tab,setTab]=useState("home");
  const [units,setUnits]=useState(UNITS);
  const [lancs,setLancs]=useState([]);
  const [energia,setEnergia]=useState({kwValue:0,ipTotal:0,bandeiraTotal:0,geralAnt:0,geralAtual:0,leituras:{}});
  const upUnit=u=>setUnits(p=>p.map(x=>x.id===u.id?u:x));
  const TABS=[{k:"home",i:"⌂",l:"Início"},{k:"kitnets",i:"🏠",l:"Kitnets"},{k:"financeiro",i:"💰",l:"Financeiro"},{k:"energia",i:"⚡",l:"Energia"}];

  const mes=HOJE.getMonth(),ano=HOJE.getFullYear();
  const px=`${ano}-${String(mes+1).padStart(2,"0")}`;
  const rec=lancs.filter(l=>l.data.startsWith(px)&&l.tipo==="receita").reduce((a,b)=>a+b.valor,0);
  const des=lancs.filter(l=>l.data.startsWith(px)&&l.tipo==="despesa").reduce((a,b)=>a+b.valor,0);

  const navBar=e("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(13,13,26,0.97)",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",justifyContent:"space-around",padding:"10px 0 16px"}},
    TABS.map(t=>e("button",{key:t.k,onClick:()=>setTab(t.k),style:{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",color:tab===t.k?"#f59e0b":"#666",padding:"4px 12px"}},
      e("span",{style:{fontSize:20}},t.i),
      e("span",{style:{fontSize:10,fontWeight:tab===t.k?700:500}},t.l)
    ))
  );

  let content;
  if(tab==="home"){
    content=e("div",{style:{display:"flex",flexDirection:"column",gap:18}},
      e("div",null,
        e("div",{style:{fontSize:11,color:"#f59e0b",letterSpacing:2,textTransform:"uppercase",fontWeight:700}},"Resumo Geral"),
        e("div",{style:{fontSize:22,fontWeight:800,marginTop:4}},"Prédio — Nova Marabá"),
        e("div",{style:{fontSize:12,color:"#888",marginTop:2}},"Folha 29 · Q21 · L24 · Marabá–PA")
      ),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
        [{label:"Ocupadas",value:units.filter(u=>u.status==="ocupado").length,icon:"🏠",color:"#22c55e"},
         {label:"Vagas",value:units.filter(u=>u.status==="vago").length,icon:"🔑",color:"#f59e0b"},
         {label:`Receita ${MESES[mes]}`,value:fmt(rec),icon:"💰",color:"#3b82f6"},
         {label:`Despesas ${MESES[mes]}`,value:fmt(des),icon:"📋",color:"#ef4444"}
        ].map((x,i)=>card(
          [e("div",{key:"i",style:{fontSize:24}},x.icon),e("div",{key:"v",style:{fontSize:18,fontWeight:800,color:x.color,marginTop:4}},x.value),e("div",{key:"l",style:{fontSize:11,color:"#888",marginTop:2}},x.label)],
          {key:i,textAlign:"center",padding:14}
        ))
      ),
      card(
        [e("div",{key:"t",style:{fontSize:12,color:"#f59e0b",fontWeight:700,marginBottom:12,textTransform:"uppercase"}},"Status das Unidades"),
         ...units.map(u=>e("div",{key:u.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}},
           e("div",null,e("div",{style:{fontWeight:700,fontSize:13}},u.nome),e("div",{style:{fontSize:11,color:"#888"}},u.status==="ocupado"?u.morador:"Vago")),
           e("div",{style:{textAlign:"right"}},
             e("div",{style:{fontSize:13,fontWeight:700,color:"#f59e0b"}},u.aluguel>0?fmt(u.aluguel)+"/mês":"—"),
             e("div",{style:{fontSize:11,color:u.status==="ocupado"?"#22c55e":"#f59e0b",fontWeight:600,marginTop:2}},u.status==="ocupado"?"● Ocupado":"○ Vago")
           )
         ))
        ]
      )
    );
  } else if(tab==="kitnets"){
    content=e("div",null,
      e("div",{style:{fontSize:11,color:"#f59e0b",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:4}},"Kitnets & Comercial"),
      e("div",{style:{fontSize:18,fontWeight:800,marginBottom:18}},"Gestão de Unidades"),
      e("div",{style:{fontSize:13,color:"#888",padding:"20px",textAlign:"center"}},"Em breve: detalhes das kitnets")
    );
  } else if(tab==="financeiro"){
    content=e("div",null,
      e("div",{style:{fontSize:11,color:"#f59e0b",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:4}},"Financeiro"),
      e("div",{style:{fontSize:18,fontWeight:800,marginBottom:14}},"Receitas & Despesas"),
      e("div",{style:{fontSize:13,color:"#888",padding:"20px",textAlign:"center"}},"Em breve: lançamentos")
    );
  } else {
    content=e("div",null,
      e("div",{style:{fontSize:11,color:"#f59e0b",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:4}},"Energia"),
      e("div",{style:{fontSize:18,fontWeight:800,marginBottom:14}},"Dashboard de Medidores"),
      e("div",{style:{fontSize:13,color:"#888",padding:"20px",textAlign:"center"}},"Em breve: medidores")
    );
  }

  return e("div",{style:{minHeight:"100vh",background:"#0d0d1a",color:"#f0f0f0",fontFamily:"sans-serif",maxWidth:480,margin:"0 auto",paddingBottom:84}},
    e("div",{style:{padding:"20px 20px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      e("div",null,
        e("div",{style:{fontSize:10,color:"#f59e0b",letterSpacing:2,fontWeight:700,textTransform:"uppercase"}},"seu Antônio"),
        e("div",{style:{fontSize:16,fontWeight:800}},"Gestão de Kitnets")
      ),
      e("div",{style:{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#f59e0b,#ef4444)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}},"🏢")
    ),
    e("div",{style:{padding:"20px 16px 0"}},content),
    navBar
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(e(App,null));
</script>
</body>
</html>
