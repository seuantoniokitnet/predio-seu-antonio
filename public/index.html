<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kitnets — seu Antônio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0d0d1a;color:#f0f0f0;font-family:sans-serif}input,select{outline:none;font-family:sans-serif;color:#fff}button{font-family:sans-serif}</style>
</head>
<body>
<div id="root"><div style="color:#f59e0b;padding:40px;text-align:center;font-family:sans-serif">🏢 Carregando...</div></div>
<script>
const h=React.createElement;
const {useState}=React;
const MESES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const MESES_FULL=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const HOJE=new Date();

const UNITS=[
{id:1,tipo:"kitnet",nome:"Kitnet 01",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},
{id:2,tipo:"kitnet",nome:"Kitnet 02",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},
{id:3,tipo:"kitnet",nome:"Kitnet 03",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},
{id:4,tipo:"kitnet",nome:"Kitnet 04",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},
{id:5,tipo:"kitnet",nome:"Kitnet 05",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},
{id:6,tipo:"kitnet",nome:"Kitnet 06",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},
{id:7,tipo:"comercial",nome:"Espaço Comercial",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:10,status:"vago"}
];

const fmt=v=>Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const fmtDate=d=>new Date(d+"T12:00:00").toLocaleDateString("pt-BR");
const padDate=(y,m,d)=>y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

// Calcula status de um lançamento pelo vencimento
const calcStatus=function(lanc){
  if(lanc.statusManual==="pago") return "pago";
  const venc=new Date(lanc.vencimento+"T12:00:00");
  return HOJE>venc?"atrasado":"pendente";
};

const sColor=s=>s==="pago"?"#22c55e":s==="atrasado"?"#ef4444":"#f59e0b";
const sLabel=s=>s==="pago"?"Pago":s==="atrasado"?"Atrasado":"Pendente";

const Card=(ch,st)=>h("div",{style:Object.assign({background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:20},st||{})},ch);
const bi={width:"100%",padding:"9px 11px",borderRadius:9,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:13,boxSizing:"border-box"};
const SL=(txt,color)=>h("div",{style:{fontSize:10,color:color||"#888",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}},txt);
const Pill=(txt,active,onClick)=>h("button",{onClick,style:{padding:"7px 16px",borderRadius:30,border:active?"1px solid #f59e0b":"1px solid rgba(255,255,255,0.12)",background:active?"rgba(245,158,11,0.13)":"transparent",color:active?"#f59e0b":"#aaa",fontWeight:600,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}},txt);

// ── HOME ──────────────────────────────────────────────────────────────────
function Home({units,lancs}){
  const mes=HOJE.getMonth(),ano=HOJE.getFullYear();
  const px=ano+"-"+String(mes+1).padStart(2,"0");
  const rec=lancs.filter(l=>l.data&&l.data.startsWith(px)&&l.tipo==="receita"&&(l.statusManual==="pago")).reduce((a,b)=>a+b.valor,0);
  const des=lancs.filter(l=>l.data&&l.data.startsWith(px)&&l.tipo==="despesa"&&(l.statusManual==="pago")).reduce((a,b)=>a+b.valor,0);
  const prevRec=lancs.filter(l=>l.vencimento&&l.vencimento.startsWith(px)&&l.tipo==="receita"&&calcStatus(l)!=="pago").reduce((a,b)=>a+b.valor,0);
  const atras=lancs.filter(l=>calcStatus(l)==="atrasado"&&l.tipo==="receita");
  return h("div",{style:{display:"flex",flexDirection:"column",gap:18}},
    h("div",null,
      h("div",{style:{fontSize:11,color:"#f59e0b",letterSpacing:2,textTransform:"uppercase",fontWeight:700}},"Resumo Geral"),
      h("div",{style:{fontSize:22,fontWeight:800,marginTop:4}},"Prédio — Nova Marabá"),
      h("div",{style:{fontSize:12,color:"#888",marginTop:2}},"Folha 29 · Q21 · L24 · Marabá–PA")
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      [{label:"Ocupadas",value:units.filter(u=>u.status==="ocupado").length,icon:"🏠",color:"#22c55e"},
       {label:"Vagas",value:units.filter(u=>u.status==="vago").length,icon:"🔑",color:"#f59e0b"},
       {label:"Recebido "+MESES[mes],value:fmt(rec),icon:"💰",color:"#3b82f6"},
       {label:"A Receber "+MESES[mes],value:fmt(prevRec),icon:"⏳",color:"#a855f7"}
      ].map(function(x,i){return Card([
        h("div",{key:"i",style:{fontSize:24}},x.icon),
        h("div",{key:"v",style:{fontSize:16,fontWeight:800,color:x.color,marginTop:4}},x.value),
        h("div",{key:"l",style:{fontSize:11,color:"#888",marginTop:2}},x.label)
      ],{key:i,textAlign:"center",padding:14});})
    ),
    Card([
      h("div",{key:"t",style:{fontSize:12,color:"#f59e0b",fontWeight:700,marginBottom:12,textTransform:"uppercase"}},"Status das Unidades"),
      units.map(function(u){return h("div",{key:u.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}},
        h("div",null,h("div",{style:{fontWeight:700,fontSize:13}},u.nome),h("div",{style:{fontSize:11,color:"#888"}},u.status==="ocupado"?u.morador:"Vago")),
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontSize:13,fontWeight:700,color:"#f59e0b"}},u.aluguel>0?fmt(u.aluguel)+"/mês":"—"),
          h("div",{style:{fontSize:11,color:u.status==="ocupado"?"#22c55e":"#f59e0b",fontWeight:600,marginTop:2}},u.status==="ocupado"?"● Ocupado":"○ Vago")
        )
      );})
    ]),
    atras.length>0&&Card([
      h("div",{key:"t",style:{fontSize:12,color:"#ef4444",fontWeight:700,marginBottom:8,textTransform:"uppercase"}},"⚠ Pagamentos Atrasados"),
      atras.slice(0,5).map(function(l){return h("div",{key:l.id,style:{fontSize:12,padding:"4px 0",color:"#fca5a5",display:"flex",justifyContent:"space-between"}},
        h("span",null,(l.desc||"").substring(0,30)),
        h("span",{style:{fontWeight:700}},fmt(l.valor))
      );})
    ],{borderColor:"rgba(239,68,68,0.27)",background:"rgba(239,68,68,0.07)"})
  );
}

// ── FINANCEIRO ────────────────────────────────────────────────────────────
function PagarModal({lanc,onSave,onClose}){
  const [dataPag,setDataPag]=useState(HOJE.toISOString().slice(0,10));
  return h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:2000,display:"flex",alignItems:"flex-end",justifyContent:"center"},onClick:onClose},
    h("div",{style:{background:"#1a1a2e",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"24px 24px 0 0",padding:24,width:"100%",maxWidth:480},onClick:function(e){e.stopPropagation();}},
      h("div",{style:{fontWeight:800,fontSize:16,marginBottom:16}},"Registrar Pagamento"),
      h("div",{style:{marginBottom:8,fontSize:13,color:"#aaa"}},lanc.desc),
      h("div",{style:{marginBottom:4,fontSize:13,color:"#f59e0b",fontWeight:700}},fmt(lanc.valor)),
      h("div",{style:{marginBottom:16}},SL("Data do Pagamento"),h("input",{type:"date",value:dataPag,onChange:function(e){setDataPag(e.target.value);},style:bi})),
      h("div",{style:{display:"flex",gap:10}},
        h("button",{onClick:onClose,style:{flex:1,padding:12,borderRadius:12,border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:"#aaa",fontWeight:700,cursor:"pointer"}},"Cancelar"),
        h("button",{onClick:function(){onSave(dataPag);onClose();},style:{flex:2,padding:12,borderRadius:12,border:"none",background:"#22c55e",color:"#000",fontWeight:800,cursor:"pointer"}},"✓ Confirmar Pago")
      )
    )
  );
}

function LancForm({initial,units,onSave,onCancel}){
  const today=HOJE.toISOString().slice(0,10);
  const [form,setForm]=useState(initial?Object.assign({},initial,{valor:String(initial.valor)}):{data:today,vencimento:today,tipo:"receita",desc:"",valor:"",unidade:"geral",statusManual:"pago"});
  const f=(k,v)=>setForm(function(p){return Object.assign({},p,{[k]:v});});
  const ok=form.desc&&form.valor&&form.vencimento;
  return Card([
    h("div",{key:"tt",style:{fontWeight:700,marginBottom:12,fontSize:14}},initial&&initial.id?"✏ Editar":"+ Novo Lançamento"),
    h("div",{key:"r1",style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
      h("div",{key:"t"},SL("Tipo"),h("select",{value:form.tipo,onChange:function(e){f("tipo",e.target.value);},style:bi},
        h("option",{value:"receita"},"Receita"),h("option",{value:"despesa"},"Despesa"))),
      h("div",{key:"s"},SL("Status"),h("select",{value:form.statusManual,onChange:function(e){f("statusManual",e.target.value);},style:bi},
        h("option",{value:"pago"},"Pago"),h("option",{value:"pendente"},"Pendente")))
    ),
    h("div",{key:"desc",style:{marginBottom:10}},SL("Descrição"),h("input",{value:form.desc,onChange:function(e){f("desc",e.target.value);},placeholder:"Ex: Aluguel Kitnet 01",style:bi})),
    h("div",{key:"r2",style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
      h("div",{key:"v"},SL("Valor (R$)"),h("input",{type:"number",value:form.valor,onChange:function(e){f("valor",e.target.value);},placeholder:"0,00",style:bi})),
      h("div",{key:"u"},SL("Unidade"),h("select",{value:form.unidade,onChange:function(e){f("unidade",e.target.value==="geral"?"geral":+e.target.value);},style:bi},
        h("option",{value:"geral"},"Geral"),
        units.map(function(u){return h("option",{key:u.id,value:u.id},u.nome);})))
    ),
    h("div",{key:"r3",style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}},
      h("div",{key:"d"},SL("Data Pagamento"),h("input",{type:"date",value:form.data||"",onChange:function(e){f("data",e.target.value);},style:bi})),
      h("div",{key:"vc"},SL("Data Vencimento"),h("input",{type:"date",value:form.vencimento||"",onChange:function(e){f("vencimento",e.target.value);},style:bi}))
    ),
    h("div",{key:"btns",style:{display:"flex",gap:8}},
      h("button",{onClick:onCancel,style:{flex:1,padding:10,borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:"#aaa",fontWeight:700,cursor:"pointer"}},"Cancelar"),
      h("button",{onClick:function(){if(ok)onSave(Object.assign({},form,{valor:+form.valor}));},style:{flex:2,padding:10,borderRadius:10,border:"none",background:ok?"#f59e0b":"#444",color:ok?"#000":"#888",fontWeight:800,cursor:ok?"pointer":"not-allowed"}},"Salvar")
    )
  ],{marginBottom:14,borderColor:"rgba(245,158,11,0.3)"});
}

function Financeiro({lancs,setLancs,units}){
  const [mes,setMes]=useState(HOJE.getMonth());
  const [ano]=useState(HOJE.getFullYear());
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [delId,setDelId]=useState(null);
  const [pagarId,setPagarId]=useState(null);
  const [filtro,setFiltro]=useState("todos");

  const px=ano+"-"+String(mes+1).padStart(2,"0");
  const fil=lancs.filter(function(l){
    const ref=l.vencimento||l.data||"";
    return ref.startsWith(px);
  }).sort(function(a,b){return (a.vencimento||a.data||"").localeCompare(b.vencimento||b.data||"");});

  const filtrados=filtro==="todos"?fil:fil.filter(function(l){return calcStatus(l)===filtro;});
  const rec=fil.filter(l=>l.tipo==="receita"&&l.statusManual==="pago").reduce((a,b)=>a+b.valor,0);
  const des=fil.filter(l=>l.tipo==="despesa"&&l.statusManual==="pago").reduce((a,b)=>a+b.valor,0);
  const prevRec=fil.filter(l=>l.tipo==="receita"&&calcStatus(l)!=="pago").reduce((a,b)=>a+b.valor,0);

  const pagarLanc=lancs.find(function(l){return l.id===pagarId;});

  return h("div",null,
    h("div",{style:{fontSize:11,color:"#f59e0b",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:4}},"Financeiro"),
    h("div",{style:{fontSize:18,fontWeight:800,marginBottom:14}},"Receitas & Despesas"),
    h("div",{style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:14}},MESES.map(function(m,i){return Pill(m,mes===i,function(){setMes(i);});})),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}},
      [{l:"Recebido",v:rec,c:"#22c55e"},{l:"Despesas",v:des,c:"#ef4444"},{l:"A Receber",v:prevRec,c:"#a855f7"}].map(function(x,i){
        return Card([h("div",{key:"l",style:{fontSize:10,color:"#888"}},x.l),h("div",{key:"v",style:{fontSize:12,fontWeight:800,color:x.c,marginTop:3}},fmt(x.v))],{key:i,textAlign:"center",padding:10});
      })
    ),
    h("div",{style:{display:"flex",gap:6,marginBottom:12}},
      ["todos","pendente","atrasado","pago"].map(function(f){
        return h("button",{key:f,onClick:function(){setFiltro(f);},style:{padding:"5px 12px",borderRadius:20,border:filtro===f?"1px solid #f59e0b":"1px solid rgba(255,255,255,0.12)",background:filtro===f?"rgba(245,158,11,0.13)":"transparent",color:filtro===f?"#f59e0b":"#888",fontSize:12,cursor:"pointer"}},f.charAt(0).toUpperCase()+f.slice(1));
      })
    ),
    !showForm&&!editId&&h("button",{onClick:function(){setShowForm(true);},style:{width:"100%",padding:"11px",borderRadius:12,border:"1px dashed rgba(245,158,11,0.5)",background:"rgba(245,158,11,0.05)",color:"#f59e0b",fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:14}},"+ Novo Lançamento"),
    showForm&&h(LancForm,{units,onSave:function(fm){setLancs(function(p){return [Object.assign({id:Date.now()},fm)].concat(p);});setShowForm(false);},onCancel:function(){setShowForm(false);}}),
    filtrados.length===0?h("div",{style:{textAlign:"center",color:"#666",padding:"32px 20px"}},h("div",{style:{fontSize:28,marginBottom:8}},"📋"),h("div",{style:{fontSize:13,color:"#888"}},"Nenhum lançamento em "+MESES_FULL[mes])):
    filtrados.map(function(l){
      const st=calcStatus(l);
      const sc=sColor(st);
      const un=l.unidade==="geral"?"Geral":(units.find(function(u){return u.id===l.unidade;})||{}).nome||"";
      if(editId===l.id)return h(LancForm,{key:l.id,initial:l,units,onSave:function(fm){setLancs(function(p){return p.map(function(x){return x.id===editId?Object.assign({},x,fm):x;});});setEditId(null);},onCancel:function(){setEditId(null);}});
      return h("div",{key:l.id,style:{borderBottom:"1px solid rgba(255,255,255,0.05)"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"11px 0",gap:8}},
          h("div",{style:{flex:1,minWidth:0}},
            h("div",{style:{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},l.desc),
            h("div",{style:{fontSize:10,color:"#888",marginTop:2}},"Venc: "+(l.vencimento?fmtDate(l.vencimento):"—")+" · "+un),
            l.statusManual==="pago"&&l.data&&h("div",{style:{fontSize:10,color:"#22c55e",marginTop:1}},"✓ Pago em "+fmtDate(l.data)),
            h("span",{style:{background:sc+"22",color:sc,border:"1px solid "+sc+"44",padding:"1px 8px",borderRadius:10,fontSize:10,fontWeight:700,textTransform:"uppercase",display:"inline-block",marginTop:3}},sLabel(st))
          ),
          h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}},
            h("div",{style:{fontWeight:800,fontSize:13,color:l.tipo==="receita"?"#22c55e":"#ef4444"}},(l.tipo==="receita"?"+":"-")+fmt(l.valor)),
            h("div",{style:{display:"flex",gap:4}},
              st!=="pago"&&h("button",{onClick:function(){setPagarId(l.id);},style:{background:"rgba(34,197,94,0.15)",border:"1px solid rgba(34,197,94,0.4)",borderRadius:7,color:"#4ade80",padding:"4px 7px",fontSize:11,cursor:"pointer"}},"✓ Pagar"),
              h("button",{onClick:function(){setEditId(l.id);setShowForm(false);setDelId(null);},style:{background:"rgba(59,130,246,0.15)",border:"1px solid rgba(59,130,246,0.4)",borderRadius:7,color:"#60a5fa",padding:"4px 7px",fontSize:11,cursor:"pointer"}},"✏"),
              h("button",{onClick:function(){setDelId(delId===l.id?null:l.id);},style:{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:7,color:"#f87171",padding:"4px 7px",fontSize:11,cursor:"pointer"}},"🗑")
            )
          )
        ),
        delId===l.id&&h("div",{style:{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("span",{style:{fontSize:12,color:"#fca5a5"}},"Excluir?"),
          h("div",{style:{display:"flex",gap:8}},
            h("button",{onClick:function(){setDelId(null);},style:{padding:"5px 12px",borderRadius:7,border:"1px solid rgba(255,255,255,0.15)",background:"transparent",color:"#aaa",fontSize:12,cursor:"pointer"}},"Não"),
            h("button",{onClick:function(){setLancs(function(p){return p.filter(function(x){return x.id!==l.id;});});setDelId(null);},style:{padding:"5px 12px",borderRadius:7,border:"none",background:"#ef4444",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}},"Sim")
          )
        )
      );
    }),
    pagarLanc&&h(PagarModal,{lanc:pagarLanc,onSave:function(dataPag){setLancs(function(p){return p.map(function(x){return x.id===pagarId?Object.assign({},x,{statusManual:"pago",data:dataPag}):x;});});setPagarId(null);},onClose:function(){setPagarId(null);}})
  );
}

// ── KITNETS ───────────────────────────────────────────────────────────────
function KitnetCard({unit,lancs,onEdit}){
  const [open,setOpen]=useState(false);
  const dia=unit.diaCobranca||5;
  const vencido=unit.status==="ocupado"&&HOJE>new Date(HOJE.getFullYear(),HOJE.getMonth(),dia);

  // Todos os lançamentos desta kitnet ordenados por vencimento desc
  const meuLancs=lancs.filter(function(l){return l.unidade===unit.id;}).sort(function(a,b){return (b.vencimento||b.data||"").localeCompare(a.vencimento||a.data||"");});
  const aluguelLancs=meuLancs.filter(function(l){return l.subTipo==="aluguel";});
  const energiaLancs=meuLancs.filter(function(l){return l.subTipo==="energia";});
  const outrosLancs=meuLancs.filter(function(l){return !l.subTipo||l.subTipo==="outros";});

  const renderLancItem=function(l){
    const st=calcStatus(l);
    const sc=sColor(st);
    return h("div",{key:l.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}},
      h("div",null,
        h("div",{style:{fontSize:12}},l.desc||"—"),
        h("div",{style:{fontSize:10,color:"#888"}},"Venc: "+(l.vencimento?fmtDate(l.vencimento):"—")),
        l.statusManual==="pago"&&l.data&&h("div",{style:{fontSize:10,color:"#22c55e"}},"✓ "+fmtDate(l.data))
      ),
      h("div",{style:{textAlign:"right"}},
        h("div",{style:{fontWeight:700,fontSize:12,color:l.tipo==="receita"?"#22c55e":"#ef4444"}},(l.tipo==="receita"?"+":"-")+fmt(l.valor)),
        h("span",{style:{background:sc+"22",color:sc,border:"1px solid "+sc+"44",padding:"1px 6px",borderRadius:8,fontSize:9,fontWeight:700,textTransform:"uppercase"}},sLabel(st))
      )
    );
  };

  return Card([
    h("div",{key:"hdr",style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",cursor:"pointer"},onClick:function(){setOpen(!open);}},
      h("div",null,
        h("div",{style:{fontWeight:800,fontSize:15}},unit.nome),
        h("div",{style:{fontSize:12,color:"#aaa",marginTop:2}},unit.status==="ocupado"?unit.morador:"Vago"),
        unit.status==="ocupado"&&h("div",{style:{fontSize:11,marginTop:3}},"Vence dia ",
          h("span",{style:{color:vencido?"#ef4444":"#f59e0b",fontWeight:700,background:vencido?"rgba(239,68,68,0.12)":"rgba(245,158,11,0.1)",padding:"1px 6px",borderRadius:6}},dia+(vencido?" ⚠":""))
        )
      ),
      h("div",{style:{textAlign:"right"}},
        h("div",{style:{fontWeight:700,color:"#f59e0b"}},unit.aluguel>0?fmt(unit.aluguel):"—"),
        h("div",{style:{fontSize:11,color:"#888",marginTop:2}},open?"▲ Fechar":"▼ Detalhes")

// ── ENERGIA ───────────────────────────────────────────────────────────────
function Energia({units,energia,setEnergia,lancs,setLancs}){
  const [mes,setMes]=useState(HOJE.getMonth());
  const ano=HOJE.getFullYear();
  const key=ano+"-"+mes;
  const leit=energia.leituras[key]||{};
  const upG=function(k,v){setEnergia(function(p){return Object.assign({},p,{[k]:+v});});};
  const upL=function(id,k,v){setEnergia(function(p){const nl=Object.assign({},p.leituras);nl[key]=Object.assign({},nl[key]);nl[key][id]=Object.assign({},nl[key][id]||{ant:0,atual:0},{[k]:+v});return Object.assign({},p,{leituras:nl});});};

  const cG=Math.max(0,(energia.geralAtual||0)-(energia.geralAnt||0));
  const kits=units.filter(function(u){return u.tipo==="kitnet";});
  const soma=kits.reduce(function(a,u){if(u.status==="vago")return a;const l=leit[u.id];return a+(l?Math.max(0,l.atual-l.ant):0);},0);
  const comum=Math.max(0,cG-soma);
  const rateio=comum>0?(comum*energia.kwValue)/6:0;
  const ip=(energia.ipTotal||0)/6;
  const band=(energia.bandeiraTotal||0)/6;
  const eI=function(ac){return{width:"100%",padding:"9px 11px",borderRadius:9,border:"1px solid "+(ac?"rgba(245,158,11,0.5)":"rgba(255,255,255,0.12)"),background:ac?"rgba(245,158,11,0.06)":"rgba(255,255,255,0.06)",color:ac?"#f59e0b":"#fff",fontSize:14,fontWeight:700,boxSizing:"border-box"};};
  const calc=function(id){const u=units.find(function(x){return x.id===id;});if(!u||u.status==="vago")return null;const l=leit[id];if(!l)return null;const c=Math.max(0,l.atual-l.ant);return{c,ev:c*energia.kwValue,total:c*energia.kwValue+rateio+ip+band};};

  // Gerar lançamentos de energia para o mês seguinte
  const gerarLancamentosEnergia=function(){
    const proxMes=mes+1>11?0:mes+1;
    const proxAno=mes+1>11?ano+1:ano;
    const novos=[];
    kits.forEach(function(u){
      if(u.status==="vago")return;
      const c=calc(u.id);
      if(!c)return;
      const dia=u.diaCobranca||5;
      const venc=padDate(proxAno,proxMes,dia);
      // Verificar se já existe lançamento de energia para esse mês/kitnet
      const jaExiste=lancs.some(function(l){return l.unidade===u.id&&l.subTipo==="energia"&&l.vencimento===venc;});
      if(!jaExiste){
        novos.push({
          id:Date.now()+u.id,
          tipo:"receita",
          subTipo:"energia",
          desc:"Energia "+u.nome+" — "+MESES_FULL[proxMes]+"/"+proxAno,
          valor:Math.round(c.total*100)/100,
          unidade:u.id,
          vencimento:venc,
          data:"",
          statusManual:"pendente"
        });
      }
    });
    if(novos.length>0){
      setLancs(function(p){return novos.concat(p);});
      alert("✅ "+novos.length+" lançamento(s) de energia gerados para "+MESES_FULL[proxMes]+"/"+proxAno+"!");
    } else {
      alert("⚠ Lançamentos de energia já existem para "+MESES_FULL[proxMes+1>11?0:proxMes]+". Nenhum novo gerado.");
    }
  };

  return h("div",null,
    h("div",{style:{fontSize:11,color:"#f59e0b",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:4}},"Energia"),
    h("div",{style:{fontSize:18,fontWeight:800,marginBottom:14}},"Dashboard de Medidores"),
    h("div",{style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:14}},MESES.map(function(m,i){return Pill(m,mes===i,function(){setMes(i);});})),
    Card([
      h("div",{key:"t",style:{fontSize:11,color:"#3b82f6",fontWeight:800,textTransform:"uppercase",marginBottom:12}},"⚡ Relógio Geral do Prédio"),
      h("div",{key:"g",style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
        h("div",{key:"a"},SL("Leit. Anterior (kWh)"),h("input",{type:"number",value:energia.geralAnt||"",placeholder:"0",onChange:function(e){upG("geralAnt",e.target.value);},style:eI(false)})),
        h("div",{key:"b"},SL("Leit. Atual (kWh)"),h("input",{type:"number",value:energia.geralAtual||"",placeholder:"0",onChange:function(e){upG("geralAtual",e.target.value);},style:eI(false)}))
      ),
      h("div",{key:"r",style:{background:"rgba(59,130,246,0.1)",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between"}},
        h("div",{style:{fontSize:12,color:"#93c5fd"}},"Consumo Geral"),
        h("div",{style:{fontWeight:800,fontSize:20,color:"#3b82f6"}},cG+" kWh")
      )
    ],{marginBottom:14,borderColor:"rgba(59,130,246,0.4)",background:"rgba(59,130,246,0.05)"}),
    Card([
      h("div",{key:"t",style:{fontSize:11,color:"#f59e0b",fontWeight:800,textTransform:"uppercase",marginBottom:8}},"📄 Conta Equatorial"),
      h("div",{key:"kw",style:{marginBottom:12}},
        h("div",{style:{fontSize:10,color:"#f59e0b",marginBottom:4,textTransform:"uppercase",fontWeight:700}},"Valor kWh (R$) — replica para todas"),
        h("input",{type:"number",step:"0.001",value:energia.kwValue||"",placeholder:"0,000",onChange:function(e){setEnergia(function(p){return Object.assign({},p,{kwValue:+e.target.value});});},style:Object.assign({},eI(true),{fontSize:16})})
      ),
      h("div",{key:"gr",style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
        h("div",{key:"ip"},SL("Ilum. Pública (R$) total"),h("input",{type:"number",value:energia.ipTotal||"",placeholder:"0,00",onChange:function(e){upG("ipTotal",e.target.value);},style:eI(false)}),h("div",{style:{fontSize:10,color:"#4ade80",marginTop:3}},"÷6 = "+fmt(ip)+"/kit")),
        h("div",{key:"ba"},SL("Bandeira (R$) total"),h("input",{type:"number",value:energia.bandeiraTotal||"",placeholder:"0,00",onChange:function(e){upG("bandeiraTotal",e.target.value);},style:eI(false)}),h("div",{style:{fontSize:10,color:"#4ade80",marginTop:3}},"÷6 = "+fmt(band)+"/kit"))
      )
    ],{marginBottom:14,borderColor:"rgba(245,158,11,0.35)"}),
    Card([
      h("div",{key:"t",style:{fontSize:11,color:"#a855f7",fontWeight:800,textTransform:"uppercase",marginBottom:10}},"🏗 Rateio Área Comum"),
      [{l:"Consumo Geral",v:cG+" kWh",c:"#3b82f6"},{l:"Soma Kitnets",v:soma+" kWh",c:"#a78bfa"},{l:"Área Comum",v:comum+" kWh",c:"#c4b5fd"},{l:"Custo área",v:fmt(comum*energia.kwValue),c:"#a855f7"}].map(function(x,i){
        return h("div",{key:i,style:{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}},h("div",{style:{fontSize:12}},x.l),h("div",{style:{fontWeight:700,color:x.c,fontSize:14}},x.v));
      }),
      h("div",{key:"r",style:{background:"rgba(168,85,247,0.12)",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",marginTop:10}},
        h("div",{style:{fontSize:12,color:"#c4b5fd"}},"Rateio/Kitnet (÷6)"),
        h("div",{style:{fontWeight:800,fontSize:18,color:"#a855f7"}},fmt(rateio))
      )
    ],{marginBottom:14,borderColor:"rgba(168,85,247,0.4)",background:"rgba(168,85,247,0.04)"}),
    h("div",{style:{fontSize:13,fontWeight:800,marginBottom:10}},"Leituras — "+MESES_FULL[mes]),
    kits.map(function(u){
      const l=leit[u.id]||{ant:0,atual:0};
      const c=calc(u.id);
      const v=u.status==="vago";
      return Card([
        h("div",{key:"hdr",style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
          h("div",{style:{fontWeight:800,fontSize:14}},u.nome),
          v?h("span",{style:{color:"#f59e0b",fontSize:11,fontWeight:700}},"VAGO"):h("span",{style:{fontSize:11,color:"#22c55e",fontWeight:700}},"● "+(u.morador?u.morador.split(" ")[0]:"Ocupado"))
        ),
        h("div",{key:"g",style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
          h("div",{key:"a"},SL("Leit. Anterior"),h("input",{type:"number",value:l.ant||"",placeholder:"0",disabled:v,onChange:function(e){upL(u.id,"ant",e.target.value);},style:eI(false)})),
          h("div",{key:"b"},SL("Leit. Atual"),h("input",{type:"number",value:l.atual||"",placeholder:"0",disabled:v,onChange:function(e){upL(u.id,"atual",e.target.value);},style:eI(true)}))
        ),
        c&&!v&&h("div",{key:"res",style:{background:"rgba(0,0,0,0.25)",borderRadius:10,padding:12}},
          h("div",{key:"1",style:{display:"flex",justifyContent:"space-between",marginBottom:6}},h("span",{style:{fontSize:11,color:"#888"}},"Consumo"),h("span",{style:{fontWeight:700,color:"#3b82f6"}},c.c+" kWh → "+fmt(c.ev))),
          h("div",{key:"2",style:{display:"flex",justifyContent:"space-between",marginBottom:6}},h("span",{style:{fontSize:11,color:"#888"}},"Rateio área"),h("span",{style:{fontWeight:700,color:"#a855f7"}},fmt(rateio))),
          h("div",{key:"3",style:{display:"flex",justifyContent:"space-between",marginBottom:6}},h("span",{style:{fontSize:11,color:"#888"}},"Ilum. Pública"),h("span",{style:{fontWeight:700,color:"#60a5fa"}},fmt(ip))),
          h("div",{key:"4",style:{display:"flex",justifyContent:"space-between",marginBottom:10}},h("span",{style:{fontSize:11,color:"#888"}},"Bandeira"),h("span",{style:{fontWeight:700,color:"#fb923c"}},fmt(band))),
          h("div",{key:"5",style:{borderTop:"1px solid rgba(255,255,255,0.1)",paddingTop:10,display:"flex",justifyContent:"space-between"}},h("span",{style:{fontWeight:700}},"TOTAL"),h("span",{style:{fontWeight:900,fontSize:16,color:"#f59e0b"}},fmt(c.total)))
        )
      ],{key:u.id,marginBottom:12,opacity:v?0.45:1});
    }),
    kits.some(function(u){return u.status==="ocupado"&&calc(u.id);}),
    h("button",{onClick:gerarLancamentosEnergia,style:{width:"100%",marginTop:16,padding:"14px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#3b82f6,#a855f7)",color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer"}},"⚡ Gerar Cobranças de Energia para "+MESES_FULL[mes+1>11?0:mes+1])
  );
}

// ── APP ───────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("home");
  const [units,setUnits]=useState(UNITS);
  const [lancs,setLancs]=useState([]);
  const [energia,setEnergia]=useState({kwValue:0,ipTotal:0,bandeiraTotal:0,geralAnt:0,geralAtual:0,leituras:{}});

  const upUnit=function(u){
    const novaUnit=u;
    // Quando salva kitnet ocupada, gerar lançamentos de aluguel futuros (próximos 12 meses)
    if(u.status==="ocupado"&&u.aluguel>0&&u.inicio){
      const hoje=HOJE;
      const novosAlug=[];
      for(let i=0;i<13;i++){
        const d=new Date(hoje.getFullYear(),hoje.getMonth()+i,1);
        const ano=d.getFullYear();
        const mes=d.getMonth();
        const dia=u.diaCobranca||5;
        const venc=padDate(ano,mes,dia);
        const jaExiste=lancs.some(function(l){return l.unidade===u.id&&l.subTipo==="aluguel"&&l.vencimento===venc;});
        if(!jaExiste){
          novosAlug.push({
            id:Date.now()+u.id*100+i,
            tipo:"receita",
            subTipo:"aluguel",
            desc:"Aluguel "+u.nome+" — "+MESES_FULL[mes]+"/"+ano,
            valor:u.aluguel,
            unidade:u.id,
            vencimento:venc,
            data:"",
            statusManual:"pendente"
          });
        }
      }
      if(novosAlug.length>0){
        setLancs(function(p){return novosAlug.concat(p);});
      }
    }
    setUnits(function(p){return p.map(function(x){return x.id===u.id?u:x;});});
  };

  const TABS=[{k:"home",i:"⌂",l:"Início"},{k:"kitnets",i:"🏠",l:"Kitnets"},{k:"financeiro",i:"💰",l:"Financeiro"},{k:"energia",i:"⚡",l:"Energia"}];

  return h("div",{style:{minHeight:"100vh",background:"#0d0d1a",color:"#f0f0f0",fontFamily:"sans-serif",maxWidth:480,margin:"0 auto",paddingBottom:84}},
    h("div",{style:{padding:"20px 20px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h("div",null,
        h("div",{style:{fontSize:10,color:"#f59e0b",letterSpacing:2,fontWeight:700,textTransform:"uppercase"}},"seu Antônio"),
        h("div",{style:{fontSize:16,fontWeight:800}},"Gestão de Kitnets")
      ),
      h("div",{style:{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#f59e0b,#ef4444)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}},"🏢")
    ),
    h("div",{style:{padding:"20px 16px 0"}},
      tab==="home"&&h(Home,{units,lancs}),
      tab==="kitnets"&&h(Kitnets,{units,lancs,onUpdate:upUnit}),
      tab==="financeiro"&&h(Financeiro,{lancs,setLancs,units}),
      tab==="energia"&&h(Energia,{units,energia,setEnergia,lancs,setLancs})
    ),
    h("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(13,13,26,0.97)",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",justifyContent:"space-around",padding:"10px 0 16px"}},
      TABS.map(function(t){
        return h("button",{key:t.k,onClick:function(){setTab(t.k);},style:{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",color:tab===t.k?"#f59e0b":"#666",padding:"4px 12px"}},
          h("span",{style:{fontSize:20}},t.i),
          h("span",{style:{fontSize:10,fontWeight:tab===t.k?700:500}},t.l)
        );
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
